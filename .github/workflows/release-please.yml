name: Release Please

on:
  push:
    branches: ["main"]

env:
  NETBOX_VERSION: "4.5"  # update when testing against a new NetBox version

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Update COMPATIBILITY.md in release PR
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}

      - name: Insert new row into COMPATIBILITY.md
        if: ${{ steps.release.outputs.pr }}
        run: |
          VERSION="${{ fromJson(steps.release.outputs.pr).title }}"
          VERSION="${VERSION##* }"
          sed -i "/^|---|/a | ${VERSION} | ${{ env.NETBOX_VERSION }} |" COMPATIBILITY.md

      - name: Commit COMPATIBILITY.md to release PR branch
        if: ${{ steps.release.outputs.pr }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMPATIBILITY.md
          git diff --cached --quiet || git commit -m "chore: add ${VERSION} to COMPATIBILITY.md"
          git push
