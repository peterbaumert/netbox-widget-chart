name: Release

on:
  release:
    types: [published]

env:
  NETBOX_VERSION: "4.5"  # update when testing against a new NetBox version

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
      contents: read   # required for private repo checkout

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-compatibility:
    name: Update COMPATIBILITY.md
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: main

      - name: Insert new row into COMPATIBILITY.md
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "/^|---|/a | ${VERSION} | ${{ env.NETBOX_VERSION }} |" COMPATIBILITY.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMPATIBILITY.md
          git commit -m "chore: add ${{ github.event.release.tag_name }} to COMPATIBILITY.md"
          git push
