name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "New Features"
    labels: ["enhancement", "feature"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Maintenance"
    labels: ["chore", "dependencies", "refactor"]
  - title: "Other Changes"
    collapse-after: 5

autolabeler:
  - label: "feature"
    commit-message:
      - '/^feat/i'
  - label: "fix"
    commit-message:
      - '/^fix/i'
  - label: "chore"
    commit-message:
      - '/^chore|refactor|docs|style|test|ci|rename|add|update/i'
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
commit-template: "- $TITLE @$AUTHOR ($SHA)"
include-commits: true
include-pre-releases: false
version-resolver:
  major:
    labels: ["breaking change"]
  minor:
    labels: ["enhancement", "feature"]
  patch:
    labels: ["bug", "fix", "chore", "dependencies", "refactor"]
  default: patch
template: |
  ## Changes

  $CHANGES
