<div class="piechart-widget" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
  <canvas id="piechart-{{ chart_id }}" style="max-height: 260px; max-width: 100%;"></canvas>
  <p class="text-muted text-center mt-2 mb-1" style="font-size: 0.85em;">
    Total: <strong>{{ total }}</strong>
  </p>
</div>

<script>
(function () {
  'use strict';

  var chartId   = 'piechart-{{ chart_id }}';
  var chartType = '{{ chart_type }}';
  var labels    = {{ chart_labels_json|safe }};
  var data      = {{ chart_data_json|safe }};
  var colors    = {{ chart_colors_json|safe }};

  function initChart() {
    var canvas = document.getElementById(chartId);
    if (!canvas) return;

    new Chart(canvas, {
      type: chartType,
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors,
          borderWidth: 1,
          borderColor: '#fff',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              boxWidth: 12,
              padding: 8,
              font: { size: 11 }
            }
          },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                var pct   = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                return ' ' + ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
              }
            }
          }
        }
      }
    });
  }

  /* Load Chart.js once per page, then initialise this instance */
  if (typeof Chart !== 'undefined') {
    /* Already available globally (e.g. provided by NetBox or another plugin) */
    initChart();
  {% if chartjs_url %}
  } else if (!document.getElementById('netbox-piechart-chartjs')) {
    var s = document.createElement('script');
    s.id  = 'netbox-piechart-chartjs';
    s.src = '{{ chartjs_url }}';
    s.onload = initChart;
    document.head.appendChild(s);
  } else {
    /* Another widget is already loading the script — wait for it */
    document.getElementById('netbox-piechart-chartjs').addEventListener('load', initChart);
  {% endif %}
  }
}());
</script>
