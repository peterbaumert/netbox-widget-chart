<div class="chart-widget" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
  <canvas id="chart-{{ chart_id }}" style="max-height: 260px; max-width: 100%;"></canvas>
  <p class="text-muted text-center mt-2 mb-1" style="font-size: 0.85em;">
    Total: <strong>{{ total }}</strong>
  </p>
</div>

<script>
(function () {
  'use strict';

  var chartId    = 'chart-{{ chart_id }}';
  var chartType  = '{{ chart_type }}';
  var horizontal = {{ horizontal }};
  var labels     = {{ chart_labels_json|safe }};
  var data       = {{ chart_data_json|safe }};
  var colors     = {{ chart_colors_json|safe }};
  var sliceUrls  = {{ slice_urls_json|safe }};

  function isDark() {
    return document.documentElement.getAttribute('data-bs-theme') === 'dark';
  }

  function themeColors() {
    return isDark()
      ? { text: '#dee2e6', border: '#495057' }
      : { text: '#212529', border: '#ffffff' };
  }

  function initChart() {
    var canvas = document.getElementById(chartId);
    if (!canvas) return;

    var theme = themeColors();

    new Chart(canvas, {
      type: chartType,
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors,
          borderWidth: 1,
          borderColor: theme.border,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        indexAxis: horizontal ? 'y' : 'x',
        onClick: function (evt, elements) {
          if (!elements.length) return;
          var url = sliceUrls[elements[0].index];
          if (url) window.location.href = url;
        },
        onHover: function (evt, elements) {
          evt.native.target.style.cursor = elements.length && sliceUrls[elements[0].index] ? 'pointer' : 'default';
        },
        plugins: {
          legend: {
            display: chartType !== 'bar',
            position: 'bottom',
            labels: {
              boxWidth: 12,
              padding: 8,
              font: { size: 11 },
              color: theme.text,
            }
          },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var val   = chartType === 'bar' ? (horizontal ? ctx.parsed.x : ctx.parsed.y) : chartType === 'polarArea' ? ctx.parsed.r : ctx.parsed;
                var total = ctx.dataset.data.reduce(function (a, b) { return a + b; }, 0);
                var pct   = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
                return ' ' + ctx.label + ': ' + val + ' (' + pct + '%)';
              }
            }
          }
        }
      }
    });
  }

  /* Load Chart.js once per page, then initialise this instance */
  if (typeof Chart !== 'undefined') {
    /* Already available globally (e.g. provided by NetBox or another plugin) */
    initChart();
  {% if chartjs_url %}
  } else if (!document.getElementById('netbox-chartjs')) {
    var s = document.createElement('script');
    s.id  = 'netbox-chartjs';
    s.src = '{{ chartjs_url }}';
    s.onload = initChart;
    document.head.appendChild(s);
  } else {
    /* Another widget is already loading the script — wait for it */
    document.getElementById('netbox-chartjs').addEventListener('load', initChart);
  {% endif %}
  }
}());
</script>
